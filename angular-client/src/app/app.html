<header class="app-header">
  <h1>Angular Client</h1>
  @if (authService.isLoggedIn()) {
    <div class="menu-right">
      <nav class="main-nav" aria-label="Main navigation">
        <a routerLink="/health" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Health Check
        </a>
        <a routerLink="/ask-ai" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Ask AI
        </a>
        <a
          routerLink="/ai-analize-2-texts"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          AI Analize 2 Texts
        </a>
      </nav>
      <span class="user-name">{{ authService.username() || 'User' }}</span>
    </div>
  }
</header>

<main class="app-content">
  <router-outlet />
</main>
