<mat-card class="analyze-card">
  <mat-card-header>
    <mat-card-title>AI Analyze 2 Texts</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="form-grid">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>System Message</mat-label>
        <textarea id="analyze-system" matInput rows="3" placeholder="Set assistant behavior..."
          [value]="systemMessage()" (input)="setSystemMessage($event)"></textarea>
      </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Prefix for Text 1</mat-label>
        <input  matInput [(ngModel)]="prefixText1"/>
      </mat-form-field>  
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Text 1</mat-label>
        <textarea id="analyze-text-1" matInput rows="6" placeholder="Paste first text..." [value]="textOne()"
          (input)="setTextOne($event)"></textarea>
      </mat-form-field>
   
  <mat-form-field appearance="outline" class="full-width">
        <mat-label>Prefix for Text 2</mat-label>
        <input  matInput [(ngModel)]="prefixText2"/>
      </mat-form-field>  
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Text 2</mat-label>
        <textarea id="analyze-text-2" matInput rows="6" placeholder="Paste second text..." [value]="textTwo()"
          (input)="setTextTwo($event)"></textarea>
      </mat-form-field>

      <app-ollama-model-select id="analyze-model" [value]="model()"
        (valueChange)="setModel($event)"></app-ollama-model-select>
    </div>

    @if (state() === 'success') {
    <section class="result-card" aria-live="polite">
      <h3>Analysis</h3>
      <pre>{{ answer() }}</pre>
    </section>
    }

    @if (state() === 'error') {
    <p class="status error">{{ errorMessage() }}</p>
    }
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-flat-button color="primary" type="button" [disabled]="state() === 'loading'" (click)="submit()">
      @if (state() === 'loading') {
      <span class="button-content">
        <mat-spinner diameter="18"></mat-spinner>
        <span>Sending...</span>
      </span>
      } @else {
      Analyze Texts
      }
    </button>
  </mat-card-actions>
</mat-card>
